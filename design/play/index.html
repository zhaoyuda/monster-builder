<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>手搓大怪兽 · 对战 Demo</title>
<style>
  :root {
    --bg: #14121f; --panel: #1e1b2e; --panel2: #262238; --line: #3a3355;
    --text: #e8e4f5; --dim: #9b93b8; --acc: #a78bfa; --acc2: #7c5cff;
    --ok: #4ade80; --warn: #fbbf24; --bad: #f87171; --hpA: #4ade80; --hpB: #f87171;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { background: var(--bg); color: var(--text); font-family: system-ui, -apple-system, "PingFang SC", "Noto Sans CJK SC", sans-serif; font-size: 15px; line-height: 1.55; }
  .wrap { max-width: 720px; margin: 0 auto; padding: 12px 12px 80px; }
  header { display: flex; align-items: baseline; gap: 10px; padding: 10px 2px 14px; }
  header h1 { font-size: 20px; }
  header a { color: var(--dim); font-size: 13px; text-decoration: none; margin-left: auto; }
  .tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .tabs button { flex: 1; padding: 10px; font-size: 16px; border: 1px solid var(--line); background: var(--panel); color: var(--dim); border-radius: 12px; cursor: pointer; }
  .tabs button.on { background: var(--acc2); border-color: var(--acc2); color: #fff; font-weight: 700; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 14px; margin-bottom: 14px; }
  .card h2 { font-size: 15px; color: var(--acc); margin-bottom: 10px; }
  select, .btn { font-size: 15px; padding: 9px 12px; border-radius: 10px; border: 1px solid var(--line); background: var(--panel2); color: var(--text); }
  .btn { cursor: pointer; }
  .btn.primary { background: var(--acc2); border-color: var(--acc2); color: #fff; font-weight: 700; }
  .btn.primary:disabled { opacity: .4; cursor: not-allowed; }
  .btn.ghost { background: transparent; }
  /* 装配 */
  .statbar { display: flex; flex-wrap: wrap; gap: 6px 14px; font-size: 13px; color: var(--dim); }
  .statbar b { color: var(--text); font-weight: 600; }
  .statbar .bad b { color: var(--bad); }
  .statbar .warn b { color: var(--warn); }
  .errbox { margin-top: 8px; font-size: 13px; color: var(--bad); }
  .warnbox { margin-top: 8px; font-size: 13px; color: var(--warn); }
  .group { margin-top: 12px; }
  .group .gtitle { font-size: 13px; color: var(--dim); margin-bottom: 6px; }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; }
  .chip { display: inline-flex; align-items: center; gap: 6px; background: var(--panel2); border: 1px solid var(--line); border-radius: 999px; padding: 5px 11px; font-size: 14px; cursor: pointer; }
  .chip .x { color: var(--bad); font-weight: 700; }
  .chip.add { border-style: dashed; color: var(--dim); }
  .chip .sub { color: var(--dim); font-size: 12px; }
  .sheet { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: none; align-items: flex-end; z-index: 50; }
  .sheet.on { display: flex; }
  .sheet .inner { background: var(--panel); border-radius: 18px 18px 0 0; width: 100%; max-width: 720px; margin: 0 auto; max-height: 70vh; overflow-y: auto; padding: 16px; }
  .sheet h3 { font-size: 15px; margin-bottom: 10px; color: var(--acc); }
  .opt { display: flex; justify-content: space-between; gap: 8px; padding: 11px 8px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .opt:active { background: var(--panel2); }
  .opt .nm { font-weight: 600; }
  .opt .st { color: var(--dim); font-size: 13px; text-align: right; }
  /* 战斗 */
  .arena { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .side h3 { font-size: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: baseline; }
  .side h3 .price { font-size: 11px; color: var(--dim); font-weight: 400; }
  .prow { margin-bottom: 7px; font-size: 12px; }
  .prow .nm { display: flex; justify-content: space-between; color: var(--dim); }
  .prow .nm b { color: var(--text); font-weight: 500; }
  .prow.dead { opacity: .35; filter: grayscale(1); }
  .prow.dead .nm b { text-decoration: line-through; }
  .prow.torso .nm b { color: var(--acc); }
  .bar { height: 7px; background: #000; border-radius: 4px; overflow: hidden; margin-top: 2px; position: relative; }
  .bar i { display: block; position: absolute; top: 0; left: 0; height: 100%; border-radius: 4px; }
  .bar i.fill { transition: width .12s; z-index: 2; }
  .bar i.ghost { background: rgba(255,255,255,.5); transition: width .3s ease-out .16s; z-index: 1; }
  .A .bar i.fill { background: var(--hpA); } .B .bar i.fill { background: var(--hpB); }
  .logbox { background: #0d0b16; border: 1px solid var(--line); border-radius: 12px; padding: 10px 12px; height: 300px; overflow-y: auto; font-size: 13px; margin-top: 12px; }
  .logbox p { margin: 3px 0; color: var(--dim); }
  .logbox p b { color: var(--text); font-weight: 600; }
  .logbox .rhead { color: var(--acc); margin-top: 8px; font-weight: 700; }
  .logbox .brk { color: var(--bad); font-weight: 700; }
  .logbox .win { color: var(--ok); font-weight: 800; font-size: 15px; margin-top: 8px; }
  .logbox .tut { color: var(--warn); background: rgba(251, 191, 36, .08); border-left: 3px solid var(--warn); padding: 6px 8px; border-radius: 0 8px 8px 0; margin: 6px 0; }
  .ctl { display: flex; gap: 8px; margin-top: 12px; align-items: center; flex-wrap: wrap; }
  .speed { display: flex; border: 1px solid var(--line); border-radius: 10px; overflow: hidden; }
  .speed button { border: 0; background: var(--panel2); color: var(--dim); padding: 8px 12px; font-size: 13px; cursor: pointer; }
  .speed button.on { background: var(--acc2); color: #fff; }
  .seed { font-size: 12px; color: var(--dim); margin-left: auto; }
  .banner { text-align: center; font-size: 17px; font-weight: 800; padding: 10px; border-radius: 12px; margin-top: 12px; display: none; }
  .banner.win { display: block; background: rgba(74, 222, 128, .12); color: var(--ok); }
  .banner.lose { display: block; background: rgba(248, 113, 113, .12); color: var(--bad); }
  .banner.draw { display: block; background: rgba(251, 191, 36, .12); color: var(--warn); }
  .hint { font-size: 12px; color: var(--dim); margin-top: 8px; }
  /* 战役 */
  .lv { border: 1px solid var(--line); border-radius: 12px; padding: 12px; margin-top: 10px; background: var(--panel2); }
  .lv .top { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; }
  .lv .top b { font-size: 16px; }
  .lv .st { font-size: 12px; color: var(--dim); }
  .lv .story { white-space: pre-line; color: var(--dim); font-size: 13px; margin: 8px 0; border-left: 3px solid var(--acc2); padding-left: 10px; }
  .lv .enemy { font-size: 13px; color: var(--text); margin-bottom: 8px; }
  .lv.locked { opacity: .45; }
  .lv.cleared { border-color: var(--ok); }
  .lv .blockmsg { font-size: 12px; color: var(--bad); margin-top: 6px; }
  .toast { position: fixed; left: 50%; transform: translateX(-50%); bottom: 24px; background: var(--acc2); color: #fff; padding: 12px 18px; border-radius: 12px; font-weight: 700; z-index: 99; box-shadow: 0 8px 30px rgba(0,0,0,.5); display: none; max-width: 90vw; }
  .lock { opacity: .45; }
  /* 纸偶怪兽 */
  .stage { display: flex; justify-content: space-around; align-items: flex-end; padding: 10px 4px 14px; min-height: 150px; background: radial-gradient(ellipse at 50% 120%, #241f38 0%, transparent 70%); border-radius: 12px; position: relative; overflow: hidden; }
  .doll { display: flex; flex-direction: column; align-items: center; gap: 3px; position: relative; }
  .drow { display: flex; gap: 4px; align-items: flex-end; justify-content: center; }
  .dmid { align-items: center; }
  .dpart { position: relative; border: 2px solid rgba(0,0,0,.45); box-shadow: inset 0 -5px rgba(0,0,0,.22), inset 0 3px rgba(255,255,255,.14); transition: opacity .4s, filter .4s; }
  .dpart.head { width: 26px; height: 26px; border-radius: 50% 50% 42% 42%; }
  .dpart.hand { width: 20px; height: 20px; border-radius: 7px 7px 10px 4px; }
  .dpart.leg  { width: 13px; height: 27px; border-radius: 5px 5px 6px 6px; }
  .dpart.torso{ width: 62px; height: 54px; border-radius: 16px 16px 20px 20px; }
  .dpart.tail { width: 22px; height: 12px; border-radius: 2px 12px 12px 2px; transform: skewX(-18deg); align-self: center; }
  .dpart.deco { border-style: dashed; opacity: .8; }
  .dpart .eye { position: absolute; top: 7px; left: 6px; width: 5px; height: 5px; border-radius: 50%; background: #14121f; box-shadow: 9px 0 0 #14121f; }
  .dpart.dead { filter: grayscale(1); opacity: .3; transform: rotate(22deg) translateY(5px); }
  /* —— 事件视觉语法(E=向右/我方出手,W=向左/敌方出手)—— */
  @keyframes atkE { 0%{transform:none} 30%{transform:translateX(-7px)} 55%{transform:translateX(20px)} 72%{transform:translateX(20px)} 100%{transform:none} }
  @keyframes atkW { 0%{transform:none} 30%{transform:translateX(7px)} 55%{transform:translateX(-20px)} 72%{transform:translateX(-20px)} 100%{transform:none} }
  @keyframes bounceE { 0%{transform:none} 40%{transform:translateX(16px)} 65%{transform:translateX(-9px)} 100%{transform:none} }
  @keyframes bounceW { 0%{transform:none} 40%{transform:translateX(-16px)} 65%{transform:translateX(9px)} 100%{transform:none} }
  @keyframes joltE { 0%{transform:none} 30%{transform:translateX(7px) rotate(1.5deg)} 100%{transform:none} }
  @keyframes joltW { 0%{transform:none} 30%{transform:translateX(-7px) rotate(-1.5deg)} 100%{transform:none} }
  @keyframes slipE { 0%{transform:none} 35%{transform:translateX(14px) rotate(3deg)} 100%{transform:none} }
  @keyframes slipW { 0%{transform:none} 35%{transform:translateX(-14px) rotate(-3deg)} 100%{transform:none} }
  @keyframes squashK { 0%{transform:none} 40%{transform:scaleX(1.06) scaleY(.94)} 100%{transform:none} }
  @keyframes wobbleK { 0%{transform:none} 22%{transform:rotate(3deg)} 48%{transform:rotate(-3deg)} 72%{transform:rotate(1.6deg)} 100%{transform:none} }
  .doll.defeat { filter: grayscale(1) brightness(.7); opacity: .55; transform: translateY(9px) rotate(7deg); transition: transform .45s ease-in, filter .35s, opacity .45s; }
  /* 屏震(只动 transform,幅度递减) */
  @keyframes shakeS { 0%,100%{transform:none} 30%{transform:translate(2px,-1px)} 60%{transform:translate(-2px,1px)} }
  @keyframes shakeM { 0%,100%{transform:none} 20%{transform:translate(5px,-2px)} 45%{transform:translate(-4px,2px)} 70%{transform:translate(2px,-1px)} }
  @keyframes shakeL { 0%,100%{transform:none} 15%{transform:translate(8px,-3px)} 35%{transform:translate(-7px,3px)} 60%{transform:translate(4px,-2px)} 80%{transform:translate(-2px,1px)} }
  .stage.shk1 { animation: shakeS .09s; } .stage.shk2 { animation: shakeM .12s; } .stage.shk3 { animation: shakeL .16s; }
  /* 命中闪白 + 轮廓 */
  @keyframes hitflash { 0% { filter: brightness(2.4) contrast(1.3) saturate(.2); box-shadow: 0 0 0 2px rgba(255,255,255,.9); } 60% { box-shadow: 0 0 0 2px rgba(255,255,255,.35); } 100% {} }
  .dpart.hitfx { animation: hitflash .3s; }
  /* 接触点冲击环 */
  @keyframes impactK { 0% { transform: translate(-50%,-50%) scale(.3); opacity: 1; } 100% { transform: translate(-50%,-50%) scale(1.4); opacity: 0; } }
  .impact { position: absolute; top: 50%; left: 50%; width: 26px; height: 26px; border: 2px solid #fff; border-radius: 50%; pointer-events: none; z-index: 7; animation: impactK .15s ease-out forwards; }
  .impact.big { width: 38px; height: 38px; border-color: #fbbf24; box-shadow: 0 0 0 5px rgba(251,191,36,.35); }
  /* 分级伤害数字 */
  @keyframes floatup { 0% { opacity: 0; transform: translate(-50%, 3px) scale(.8); } 15% { opacity: 1; transform: translate(-50%, -2px) scale(1); } 100% { opacity: 0; transform: translate(-50%, -24px) scale(1); } }
  @keyframes popup  { 0% { opacity: 0; transform: translate(-50%, 2px) scale(.6); } 25% { opacity: 1; transform: translate(-50%, -6px) scale(1.22); } 45% { transform: translate(-50%, -8px) scale(1); } 100% { opacity: 0; transform: translate(-50%, -28px) scale(1); } }
  .fxlabel { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); font-size: 12px; font-weight: 800; white-space: nowrap; pointer-events: none; animation: floatup .5s forwards; z-index: 8; text-shadow: 0 1px 3px #000; }
  .fxlabel.d1 { font-size: 16px; animation: floatup .55s forwards; }
  .fxlabel.d2 { font-size: 21px; animation: popup .6s forwards; }
  .fxlabel.d3 { font-size: 26px; color: #fbbf24; -webkit-text-stroke: 1px #6b3f00; animation: popup .7s forwards; }
  .fxlabel.fastfx { animation-duration: .18s !important; }
  /* 击破残骸(克隆节点,不动真实 DOM) */
  .debris { position: absolute; pointer-events: none; z-index: 5; transition: transform .35s cubic-bezier(.2,.7,.4,1), opacity .4s; }
  .debris.rest { filter: grayscale(1); opacity: .45; }
  .buildStage { display: flex; justify-content: center; padding: 8px 0 4px; }
  @media (prefers-reduced-motion: reduce) {
    .stage.shk1, .stage.shk2, .stage.shk3 { animation: none; }
    .debris { transition: opacity .3s; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>🦖 手搓大怪兽</h1>
    <span style="color:var(--dim);font-size:13px">Demo v0.5 · 机制零件与插件</span>
    <a href="../">← 设计 wiki</a>
  </header>

  <div class="tabs">
    <button id="tabCamp" class="on">🗺️ 战役</button>
    <button id="tabBuild">🔧 装配</button>
    <button id="tabFight">⚔️ 对战</button>
  </div>

  <!-- 战役页(PVE) -->
  <div id="pgCamp">
    <div class="card">
      <h2>🧬 生物质:<span id="bioLbl"></span>(配装预算)</h2>
      <div class="hint">打赢关卡获得生物质、解锁新零件;去「装配」页升级你的怪兽再挑战下一关。</div>
      <div id="lvCards"></div>
      <div style="margin-top:10px"><button class="btn ghost" id="resetCamp" style="font-size:12px">🗑 重置战役进度</button></div>
    </div>
  </div>

  <!-- 装配页 -->
  <div id="pgBuild" style="display:none">
    <div class="card">
      <h2>快速开始</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <select id="preset"></select>
        <button class="btn" id="loadPreset">载入预设</button>
      </div>
      <div class="hint">也可以从零开始:先选躯干,再点各栏的「+ 添加」。</div>
    </div>

    <div class="card">
      <h2>我的怪兽</h2>
      <div class="buildStage"><div id="buildDoll"></div></div>
      <div class="statbar" id="stats"></div>
      <div class="errbox" id="errs"></div>
      <div class="warnbox" id="warns"></div>
      <div class="group">
        <div class="gtitle">躯干(必选)</div>
        <div class="chips" id="torsoRow"></div>
      </div>
      <div class="group"><div class="gtitle">头 <span id="headCap"></span></div><div class="chips" id="headRow"></div></div>
      <div class="group"><div class="gtitle">手 <span id="limbCap"></span></div><div class="chips" id="handRow"></div></div>
      <div class="group"><div class="gtitle">腿</div><div class="chips" id="legRow"></div></div>
      <div class="group"><div class="gtitle">尾巴(插件:独立位不占四肢槽,限 1,不可被攻击)</div><div class="chips" id="tailRow"></div></div>
      <div class="group"><div class="gtitle">扩展插槽(身体插件在「躯干」栏挂载)</div><div class="chips" id="slotRow"></div></div>
    </div>

    <button class="btn primary" id="goFight" style="width:100%;padding:14px;font-size:17px">⚔️ 去战斗</button>
  </div>

  <!-- 战斗页 -->
  <div id="pgFight" style="display:none">
    <div class="card">
      <h2>选择对手</h2>
      <div style="display:flex;gap:8px;flex-wrap:wrap">
        <select id="enemySel"></select>
        <button class="btn primary" id="startBtn">开打!</button>
      </div>
      <div class="hint" id="enemyDesc"></div>
    </div>

    <div class="card">
      <div class="stage"><div id="dollA"></div><div id="dollB"></div></div>
      <div class="arena">
        <div class="side A"><h3>😤 <span id="nameA">我的怪兽</span> <span class="price" id="priceA"></span></h3><div id="partsA"></div></div>
        <div class="side B"><h3>👿 <span id="nameB">对手</span> <span class="price" id="priceB"></span></h3><div id="partsB"></div></div>
      </div>
      <div class="banner" id="banner"></div>
      <div class="logbox" id="logbox"><p style="color:var(--dim)">点「开打!」开始 —— 战报会在这里滚动。</p></div>
      <div class="ctl">
        <div class="speed" id="speedCtl">
          <button data-s="600">1×</button><button data-s="280" class="on">2×</button>
          <button data-s="110">4×</button><button data-s="0">瞬间</button>
        </div>
        <button class="btn ghost" id="rematch">🎲 再战一局</button>
        <button class="btn ghost" id="muteBtn" title="音效开关"></button>
        <span class="seed" id="seedLbl"></span>
      </div>
    </div>
  </div>
</div>

<!-- 选件底部弹层 -->
<div class="sheet" id="sheet"><div class="inner"><h3 id="sheetTitle"></h3><div id="sheetOpts"></div></div></div>
<div class="toast" id="toastBox"></div>

<script src="engine.js"></script>
<script>
"use strict";
const E = MonsterEngine;
const $ = (id) => document.getElementById(id);

// ===== 存档(localStorage)=====
const SAVE_KEY = "monster-demo-v1";
// 配装项:字符串 "猛爪" 或对象 {name:"猛爪", plugin:"骨盾"}(与 engine.js makeMonster 同构)
const entryName = (e) => (typeof e === "string" ? e : e.name);
const entryPlugin = (e) => (typeof e === "string" ? "" : e.plugin || "");
const withPlugin = (e, plug) => (plug ? { name: entryName(e), plugin: plug } : entryName(e));
// 旧存档迁移:改名零件映射 + 未知零件过滤 + 能量核心从 slots 迁到躯干插件位
const RENAMED = { "粗腿": "灵活的腿" };
function sanitizeBuild(b) {
  if (!b || !b.torso) return null;
  const fix = (n) => RENAMED[n] || n;
  b.torso = fix(b.torso);
  if (!E.CATALOG[b.torso]) return null;
  b.torsoPlugin = b.torsoPlugin && E.PLUGINS[b.torsoPlugin] ? b.torsoPlugin : "";
  // 迁移:普通能量核心旧版在 slots(已不在零件目录,要在未知件过滤前认出来),现为躯干"身体"位插件
  if ((b.slots || []).some((e) => entryName(e) === "普通能量核心") && !b.torsoPlugin)
    b.torsoPlugin = "普通能量核心";
  for (const k of ["heads", "hands", "legs", "tails", "slots"])
    b[k] = (b[k] || [])
      .map((e) => {
        const n = fix(entryName(e));
        const plug = entryPlugin(e);
        if (!E.CATALOG[n] || E.CATALOG[n].derived) return null;
        if (plug && (!E.PLUGINS[plug] || !E.PLUGINS[plug].pos.includes(E.CATALOG[n].kind)))
          return n;   // 插件失效/位置不合法 → 只留部件
        return plug ? { name: n, plugin: plug } : n;
      })
      .filter(Boolean);
  return b;
}
function loadSave() {
  try {
    const s = Object.assign({ cleared: [], build: null }, JSON.parse(localStorage.getItem(SAVE_KEY) || "{}"));
    s.build = sanitizeBuild(s.build);
    return s;
  }
  catch (e) { return { cleared: [], build: null }; }
}
let save = loadSave();
function persist() { localStorage.setItem(SAVE_KEY, JSON.stringify(save)); }
persist();   // 迁移结果写回(旧存档里的改名/已删零件只清一次)

const clearedSet = () => new Set(save.cleared);
function budget() {
  return E.STARTER_BUDGET + E.CAMPAIGN.filter((l) => clearedSet().has(l.lv)).reduce((s, l) => s + l.reward, 0);
}
function unlockedSet() {
  const u = new Set(E.STARTER_UNLOCKED);
  for (const l of E.CAMPAIGN) if (clearedSet().has(l.lv)) l.unlocks.forEach((n) => u.add(n));
  return u;
}

// ===== 玩家配装状态(默认 = PVE 起始装)=====
const starterBuild = () => ({ torso: E.STARTER_BUILD.torso, torsoPlugin: "", heads: [...E.STARTER_BUILD.heads],
  hands: [...E.STARTER_BUILD.hands], legs: [...E.STARTER_BUILD.legs], tails: [], slots: [] });
let build = save.build || starterBuild();

const CAT_BY_KIND = {};
for (const [n, s] of Object.entries(E.CATALOG)) {
  if (s.pve || s.derived) continue;   // PVE 专属 / 衍生部件(芽孢长出来的手)不入玩家目录
  (CAT_BY_KIND[s.kind] = CAT_BY_KIND[s.kind] || []).push(n);
}
// 插件说明(装配 UI 用;规则实现见 engine.js)
const PLUG_DESC = {
  "头顶角质层": "替这只头挡下 2 次攻击(期间该头不暴击)",
  "头顶尖刺": "这只头暴击率 +5%",
  "骨盾": "这只手格挡成功时,承受伤害再 -20%",

// 配装里未解锁的零件/插件(载入预设可能带进来)
function lockedInBuild() {
  const u = unlockedSet();
  const entries = [build.torso, ...build.heads, ...build.hands, ...build.legs, ...build.tails, ...build.slots];
  const names = entries.map(entryName).concat(entries.map(entryPlugin));
  if (build.torsoPlugin) names.push(build.torsoPlugin);
  return [...new Set(names.filter((n) => n && !u.has(n)))];
}

function statStr(n) {
  const s = E.CATALOG[n];
  const bits = [];
  if (s.atk) bits.push(`攻${s.atk}`);
  if (s.hp) bits.push(`血${s.hp}`);
  if (s.supply) bits.push(`供能${s.supply}`);
  if (s.energy) bits.push(`耗能${s.energy}`);
  if (s.command) bits.push(`指挥${s.command}`);
  if (s.initiative) bits.push(`先攻${s.initiative}`);
  if (s.dodge) bits.push(`闪避${Math.round(s.dodge * 100)}%`);
  bits.push(`💰${s.price}`);
  return bits.join(" · ");
}

// ===== 纸偶渲染:怪兽长相 = 配装记录 =====
function partHue(name) {
  let h = 0;
  for (const ch of name) h = (h * 31 + ch.codePointAt(0)) % 360;
  return h;
}
function partColor(p) {
  const sat = p.name.startsWith("装饰") ? 18 : 55;
  return `hsl(${partHue(p.name)} ${sat}% ${p.kind === "torso" ? 42 : 55}%)`;
}
function dollPartHTML(p, sideKey) {
  const deco = p.name.startsWith("装饰") ? " deco" : "";
  const eye = p.kind === "head" ? '<i class="eye"></i>' : "";
  const key = p.kind === "torso" ? p.name : E.label(p);
  return `<div class="dpart ${p.kind}${deco}" data-dk="${sideKey}|${key}" title="${key}" style="background:${partColor(p)}">${eye}</div>`;
}
function dollHTML(m, sideKey) {
  const heads = m.heads.map((p) => dollPartHTML(p, sideKey)).join("");
  const hands = m.hands.map((p) => dollPartHTML(p, sideKey));
  const half = Math.ceil(hands.length / 2);
  const tails = m.tails.map((p) => dollPartHTML(p, sideKey)).join("");
  const legs = m.legs.map((p) => dollPartHTML(p, sideKey)).join("");
  return `<div class="doll" id="doll${sideKey}In">
    <div class="drow">${heads || ""}</div>
    <div class="drow dmid">${hands.slice(0, half).join("")}${dollPartHTML(m.torso, sideKey)}${hands.slice(half).join("")}${tails}</div>
    <div class="drow">${legs}</div>
  </div>`;
}
function dollEl(sideKey, key) {
  return document.querySelector(`[data-dk="${sideKey}|${key}"]`);
}

// ===== FX 工具:所有特效计时器统一登记,切速度/瞬间/再战时一并清空,不留上局残影 =====
const fxTimers = new Set();
function later(fn, ms) {
  const t = setTimeout(() => { fxTimers.delete(t); fn(); }, ms);
  fxTimers.add(t);
  return t;
}
function clearFx() {
  for (const t of fxTimers) clearTimeout(t);
  fxTimers.clear();
  document.querySelectorAll(".fxlabel, .impact, .debris").forEach((n) => n.remove());
  const st = document.querySelector("#pgFight .stage");
  if (st) st.classList.remove("shk1", "shk2", "shk3");
  for (const k of ["A", "B"]) {
    const d = $("doll" + k + "In");
    if (d) { d.style.animation = ""; d.classList.remove("defeat"); }
  }
}
const REDUCED = matchMedia("(prefers-reduced-motion: reduce)").matches;
const isFast = () => speedMs > 0 && speedMs <= 110;   // 4× 挡

function dollFx(sideKey, key, label, color, sizeCls, flash = true) {
  const el = dollEl(sideKey, key);
  if (!el) return;
  if (flash) { el.classList.remove("hitfx"); void el.offsetWidth; el.classList.add("hitfx"); }
  if (label) {
    const s = document.createElement("span");
    s.className = "fxlabel" + (sizeCls ? " " + sizeCls : "") + (isFast() ? " fastfx" : "");
    s.textContent = label;
    if (color) s.style.color = color;
    el.appendChild(s);
    later(() => s.remove(), 800);
  }
}
function dollAnim(sideKey, name, ms) {   // 整只纸偶播一段 keyframes(蓄力前冲/弹回/侧滑/失衡)
  const d = $("doll" + sideKey + "In");
  if (!d) return;
  d.style.animation = "none";
  void d.offsetWidth;
  d.style.animation = `${name} ${ms}ms cubic-bezier(.2,.8,.3,1)`;
  later(() => { d.style.animation = ""; }, ms + 40);
}
function partAnim(sideKey, key, name, ms) {   // 单个部件动画(格挡手压缩等)
  const el = dollEl(sideKey, key);
  if (!el) return;
  el.style.animation = "none";
  void el.offsetWidth;
  el.style.animation = `${name} ${ms}ms ease-out`;
  later(() => { el.style.animation = ""; }, ms + 40);
}
function impactAt(sideKey, key, big) {   // 接触点冲击环
  const el = dollEl(sideKey, key);
  if (!el) return;
  const s = document.createElement("span");
  s.className = "impact" + (big ? " big" : "");
  el.appendChild(s);
  later(() => s.remove(), 200);
}
function shake(level) {   // 屏震 1/2/3,只动舞台容器 transform
  if (!level || REDUCED) return;
  const st = document.querySelector("#pgFight .stage");
  if (!st) return;
  st.classList.remove("shk1", "shk2", "shk3");
  void st.offsetWidth;
  st.classList.add("shk" + level);
  later(() => st.classList.remove("shk" + level), 240);
}
function dollKill(sideKey, key) {
  const el = dollEl(sideKey, key);
  if (el) el.classList.add("dead");
}
function debrisFly(sideKey, key, ft) {   // 击破飞散:克隆视觉节点抛出落地,真实 DOM 不动
  if (REDUCED || ft > 1) return;
  const el = dollEl(sideKey, key);
  const st = document.querySelector("#pgFight .stage");
  if (!el || !st) return;
  const old = st.querySelectorAll(".debris");
  if (old.length >= 6) old[0].remove();   // 残骸上限 6
  const er = el.getBoundingClientRect(), sr = st.getBoundingClientRect();
  if (!er.width) return;
  const c = el.cloneNode(true);
  c.querySelectorAll(".fxlabel, .impact").forEach((n) => n.remove());
  c.classList.remove("hitfx", "dead");
  c.classList.add("debris");
  c.style.cssText += `;left:${er.left - sr.left}px;top:${er.top - sr.top}px;width:${er.width}px;height:${er.height}px;margin:0;`;
  st.appendChild(c);
  const dx = (sideKey === "A" ? -1 : 1) * (26 + Math.random() * 26);
  const rot = (Math.random() < .5 ? -1 : 1) * (120 + Math.random() * 100);
  const floor = sr.height - (er.top - sr.top) - er.height - 4;
  requestAnimationFrame(() => {
    c.style.transform = `translate(${dx * .6}px, -22px) rotate(${rot * .5}deg)`;          // 上抛
    later(() => {
      c.style.transition = "transform .22s cubic-bezier(.5,0,.9,.6)";                     // 近似重力下落
      c.style.transform = `translate(${dx}px, ${Math.max(0, floor)}px) rotate(${rot}deg)`;
      later(() => c.classList.add("rest"), 240);
    }, 180);
  });
}

// ===== WebAudio 合成音效(无音频文件;首次用户手势时解锁,全页一个 AudioContext)=====
const AudioFX = (() => {
  let ctx = null, noiseBuf = null;
  let muted = localStorage.getItem("monster-mute") === "1";
  const lastPlay = {};
  function ensure() {
    if (muted) return null;
    if (!ctx) {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      ctx = new AC();
      noiseBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * 0.25), ctx.sampleRate);
      const d = noiseBuf.getChannelData(0);
      for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    }
    if (ctx.state === "suspended") ctx.resume();   // iOS 切后台会挂起,回来要 resume
    return ctx;
  }
  const rnd = (v, pct) => v * (1 + (Math.random() * 2 - 1) * pct);   // 音高随机 ±pct,防机关枪
  function osc(type, f0, f1, t0, dur, vol) {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(rnd(f0, .05), t0);
    if (f1) o.frequency.exponentialRampToValueAtTime(Math.max(30, rnd(f1, .05)), t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(.001, t0 + dur);
    o.connect(g).connect(ctx.destination);
    o.start(t0); o.stop(t0 + dur + .02);
  }
  function noise(t0, dur, vol, freq) {
    const s = ctx.createBufferSource(), g = ctx.createGain(), f = ctx.createBiquadFilter();
    s.buffer = noiseBuf;
    f.type = "bandpass"; f.frequency.value = freq; f.Q.value = .9;
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(.001, t0 + dur);
    s.connect(f).connect(g).connect(ctx.destination);
    s.start(t0); s.stop(t0 + dur + .02);
  }
  function play(kind, tier) {
    if (muted || !ensure()) return;
    const now = performance.now();
    if (isFast() && (kind === "hit" || kind === "block" || kind === "dodge")) {
      if (now - (lastPlay[kind] || 0) < 90) return;   // 4× 限流:同类 90ms 至多一次(break/stun 豁免)
    }
    lastPlay[kind] = now;
    const t0 = ctx.currentTime, q = isFast() ? .6 : 1;
    if (kind === "hit") {
      osc("sine", 130 - tier * 12, 55, t0, .09 + tier * .02, .22 * q * (1 + tier * .25));
      noise(t0, .05, .1 * q, 900);
      if (tier >= 2) osc("square", 720, 240, t0, .05, .12 * q);   // 重击/暴击叠高频瞬态
    } else if (kind === "block") {
      osc("triangle", 880, 660, t0, .07, .12 * q);
      noise(t0, .04, .05 * q, 2500);
    } else if (kind === "dodge") {
      noise(t0, .08, .08 * q, 3200);
    } else if (kind === "break") {
      noise(t0, .2, .3, 700);
      osc("sawtooth", 420, 70, t0, .18, .2);
      noise(t0 + .06, .12, .18, 500);
    } else if (kind === "stun") {
      osc("sine", 240, 100, t0, .28, .16);
    } else if (kind === "win") {
      osc("sine", 523, 0, t0, .12, .15);
      osc("sine", 784, 0, t0 + .12, .2, .15);
    } else if (kind === "lose") {
      osc("sine", 330, 0, t0, .14, .13);
      osc("sine", 220, 0, t0 + .14, .26, .13);
    }
  }
  function toggle() {
    muted = !muted;
    localStorage.setItem("monster-mute", muted ? "1" : "0");
    if (!muted) ensure();
    return muted;
  }
  return { play, ensure, toggle, get muted() { return muted; } };
})();

function renderBuild() {
  const m = monster();
  const errs = E.validate(m);
  const cmd = E.commandSupply(m), limbs = m.hands.length + m.legs.length;
  const headSlots = 1 + build.slots.filter((s) => entryName(s) === "头部插槽").length;
  const limbSlots = 4 + build.slots.filter((s) => entryName(s) === "四肢插槽").length;
  const nLimbSlotUsed = build.hands.length + build.legs.length;   // 尾巴独立位
  const eu = E.energyUsed(m), sup = E.supplyTotal(m);

  $("buildDoll").innerHTML = dollHTML(m, "P");
  const price = E.priceTotal(m), bud = budget();
  $("stats").innerHTML = [
    `<span class="${price > bud ? "warn" : ""}">🧬 生物质 <b>${price}/${bud}</b></span>`,
    `<span class="${eu > sup ? "bad" : ""}">⚡ 能量 <b>${eu}/${sup}</b></span>`,
    `<span class="${build.heads.length > headSlots ? "bad" : ""}">🧩 头槽 <b>${build.heads.length}/${headSlots}</b></span>`,
    `<span class="${nLimbSlotUsed > limbSlots ? "bad" : ""}">🧩 四肢槽 <b>${nLimbSlotUsed}/${limbSlots}</b></span>`,
    `<span class="${build.tails.length > 1 ? "bad" : ""}">🧷 尾巴位 <b>${build.tails.length}/1</b></span>`,
    `<span class="${limbs > cmd ? "warn" : ""}">🧠 指挥点 <b>${cmd}</b>(手腿共 ${limbs})</span>`,
    `<span>🎲 先攻 <b>${E.initiativeTotal(m)}</b> · 💨 闪避 <b>${Math.round(E.dodgeTotal(m, E.DEFAULT_CFG) * 100)}%</b></span>`,
  ].join("");
  $("errs").textContent = errs.length ? "⛔ " + errs.join(";") + "(不能出战)" : "";
  const wmsgs = [];
  if (limbs > cmd) wmsgs.push(`⚠️ 指挥点不足:每回合只有 ${cmd} 只手/腿能出手,其余站着不动(头被打掉还会更少)。加头可以提高指挥点。`);
  const lockedUsed = lockedInBuild();
  if (lockedUsed.length) wmsgs.push(`🔒 含未解锁零件(${lockedUsed.join("、")}):只能自由对战,不能打战役。`);
  else if (price > bud) wmsgs.push(`🧬 超出生物质预算(${price} > ${bud}):只能自由对战,不能打战役。打赢战役关卡可获得更多生物质。`);
  $("warns").textContent = wmsgs.join(" ");
  $("goFight").disabled = errs.length > 0;
  renderCampaign();
  $("headCap").textContent = `(${build.heads.length}/${headSlots})`;
  $("limbCap").textContent = `(手+腿 ${nLimbSlotUsed}/${limbSlots})`;

  $("torsoRow").innerHTML =
    `<span class="chip" onclick="openSheet('torso')"><b>${build.torso}</b><span class="sub">${statStr(build.torso)}</span></span>` +
    `<span class="chip" onclick="openPlugSheet('torso',-1)">🔌 ${build.torsoPlugin || "身体插件:无"}${build.torsoPlugin ? ` <span class="sub">${PLUG_DESC[build.torsoPlugin]}</span>` : ""}</span>`;
  for (const [kind, key, rowId] of [["head","heads","headRow"],["hand","hands","handRow"],["leg","legs","legRow"],["tail","tails","tailRow"],["slot","slots","slotRow"]]) {
    const pluggable = !!PLUG_KIND_OF[key] && key !== "torso";
    const row = build[key].map((e, i) => {
      const n = entryName(e), plug = entryPlugin(e);
      const body = pluggable
        ? `<span onclick="openPlugSheet('${key}',${i})">${n}${plug ? ` <span class="sub">🔌${plug}</span>` : " 🔌"}</span>`
        : `<span onclick="removePart('${key}',${i})">${n}</span>`;
      return `<span class="chip">${body} <span class="sub">${E.CATALOG[n].atk ? "攻" + E.CATALOG[n].atk : ""}${E.CATALOG[n].hp ? " 血" + E.CATALOG[n].hp : ""}</span><span class="x" onclick="removePart('${key}',${i})">×</span></span>`;
    }).join("");
    $(rowId).innerHTML = row + `<span class="chip add" onclick="openSheet('${kind}')">+ 添加</span>`;
  }
}

function campBlockReason() {
  const m = monster();
  if (E.validate(m).length) return "⛔ 当前配装不合法(看「装配」页红字)";
  const lk = lockedInBuild();
  if (lk.length) return `🔒 配装含未解锁零件:${lk.join("、")}`;

}
function renderCampaign() {
  if (!$("lvCards")) return;
  $("bioLbl").textContent = `${E.priceTotal(monster())} / ${budget()}`;
  const cs = clearedSet();
  const firstOpen = E.CAMPAIGN.find((l) => !cs.has(l.lv));
  const block = campBlockReason();
  $("lvCards").innerHTML = E.CAMPAIGN.map((l) => {
    const cleared = cs.has(l.lv);
    const open = cleared || (firstOpen && firstOpen.lv === l.lv);
    const state = cleared ? "cleared" : open ? "" : "locked";
    const stLbl = cleared ? "✅ 已通关(可重打)" : open ? "▶ 可挑战" : "🔒 先通关上一关";
    return `<div class="lv ${state}">

function partRow(p, id) {

const view = { A: {}, B: {} };

function setHp(sideKey, lbl, hp) {
  const v = view[sideKey][lbl];
  if (!v || v.maxHp <= 0) return;
  const el = document.getElementById(v.id);
  const w = Math.max(0, (hp / v.maxHp) * 100) + "%";

  el.querySelector(".bar .ghost").style.width = w;   // 白色残影延迟 .16s 再追上(CSS transition-delay)

const other = (k) => (k === "A" ? "B" : "A");
function evLine(ev) {
  const t = ev.type;
  if (t === "round_start") return [`—— 回合 ${ev.round}(${ev.first === "A" ? "我方" : "敌方"}先手)——`, "rhead"];
  if (t === "command") return [`🧠 指挥点 我方 ${ev.cmdA} · 敌方 ${ev.cmdB}`, ""];
  if (t === "stunned") return [`💫 ${ev.side === "A" ? "我方" : "敌方"}眩晕,全队本回合不攻击!`, "brk"];
  if (t === "no_command") return [`🚫 ${ev.side === "A" ? "我方" : "敌方"} <b>${ev.part}</b> 指挥点不足,站着不动`, ""];
  if (t === "dodge") return [`💨 <b>${ev.attacker}</b> 的攻击被${ev.side === "A" ? "敌方" : "我方"}闪开了`, ""];
  if (t === "block") return [`🛡 <b>${ev.attacker}</b> → ${ev.target}:${ev.crit ? "💥暴击!" : ""}被格挡!${ev.dmg}→${ev.taken} 伤转给 <b>${ev.blocker}</b>`, ""];
  if (t === "hit") return [`${ev.side === "A" ? "🗡" : "🩸"} <b>${ev.attacker}</b> → <b>${ev.target}</b>:${ev.crit ? "💥暴击!" : ""}${ev.extra ? "🔥波及!" : ""}-${ev.dmg}${ev.fireproof ? "(耐火减半)" : ""}`, ev.crit ? "brk" : ""];
  if (t === "break") return [`💀 ${ev.side === "A" ? "我方" : "敌方"} <b>${ev.part}</b> 被击破!`, "brk"];
  if (t === "stun_set") return [`⚡ ${ev.side === "A" ? "我方" : "敌方"}头部被毁 → 下回合全队瘫痪`, "brk"];
  if (t === "timeout") return [`⏱ 打满回合上限,按躯干血量比判定`, "rhead"];
  // —— 机制事件(Q17)——
  const my = (s) => (s === "A" ? "我方" : "敌方");
  if (t === "grab") return [`🫳 <b>${ev.attacker}</b> 抓住了${my(other(ev.side))}!接下来 ${ev.rounds} 回合闪避失效`, "brk"];
  if (t === "absorb") return [`🪖 <b>${ev.target}</b> 的角质层替头挡下了 <b>${ev.attacker}</b> 的攻击(还能挡 ${ev.left} 次)`, ""];
  if (t === "status") return [ev.status === "burn"
    ? [`🔥 ${my(ev.side)} <b>${ev.part}</b> 被点燃(每回合 -2,持续 ${ev.rounds} 回合)`, ""]
    : [`🩸 ${my(ev.side)} <b>${ev.part}</b> 被撕裂(每回合 -2,持续 ${ev.rounds} 回合)`, ""]][0];
  if (t === "dot_tick") return [`${ev.status === "burn" ? "🔥" : "🩸"} ${my(ev.side)} <b>${ev.part}</b> ${ev.status === "burn" ? "灼烧" : "撕裂"} -${ev.dmg}`, ""];
  if (t === "part_stun_set") return [`🦴 <b>${ev.by}</b> 的碎骨锥命中 → ${my(ev.side)} <b>${ev.part}</b> 下回合不能行动`, ""];
  if (t === "part_stunned") return [`🦴 ${my(ev.side)} <b>${ev.part}</b> 失衡,本回合不能行动`, ""];
  if (t === "spore_set") return [`🌱 ${my(ev.side)} <b>${ev.part}</b> 碎裂,留下一枚芽孢(2 回合后重生)`, ""];
  if (t === "spore_grow") return [`🌱 ${my(ev.side)}的芽孢破土——<b>${ev.part}</b> 长了出来!`, "win"];
  if (t === "regen_start") return [`💚 ${my(ev.side)} <b>${ev.part}</b> 破裂,胶质涌出:全队每回合回 ${ev.heal} 血,持续 ${ev.rounds} 回合`, ""];
  if (t === "regen") return [`💚 ${my(ev.side)}全队回复 ${ev.heal} 血`, ""];
  if (t === "adrenaline") return [`💉 ${my(ev.side)} <b>${ev.part}</b> 破裂,肾上腺素迸发:全队立即回 5 血`, ""];
  if (t === "gland") return [`💥 ${my(ev.side)} <b>${ev.part}</b> 的爆裂腺体炸裂!<b>${ev.target}</b> -${ev.dmg}`, "brk"];
  return null;
}
// ===== 回放调度:按事件类型 × 速度挡分配 前摇/顿帧/屏震/音效/飘字(速度矩阵见 review 计划)=====
// 特效档 ft:0=1×全套, 1=2×压缩, 2=4×只留音效限流+短数字, (瞬间不走这条路)
const fxTier = () => (speedMs >= 600 ? 0 : speedMs >= 280 ? 1 : 2);
function dmgTier(ev) {   // 伤害分档:0 小伤 / 1 普通 / 2 重击 / 3 暴击
  if (ev.crit) return 3;
  const d = ev.dmg || 0;
  return d >= 20 ? 2 : d >= 8 ? 1 : 0;
}
// 事件节拍(× speedMs):无信息事件快速略过,重事件多停——节奏压缩比特效更救观感
const BEAT = { round_start: .55, command: .25, no_command: .3, stun_set: .45, stunned: .8,
               dodge: .85, block: 1, hit: 1, break: 1.35, timeout: 1,
               grab: 1, absorb: .8, status: .35, dot_tick: .35, part_stun_set: .5, part_stunned: .4,
               spore_set: .8, spore_grow: 1, regen_start: .6, regen: .4, adrenaline: .6, gland: 1.2 };

function playEv(ev, ft) {
  const t = ev.type;
  const dir = ev.side === "A" ? "E" : "W";   // 我方在左,出手向右
  if (t === "hit") {
    const g = dmgTier(ev);
    const windup = ft === 0 ? 240 : ft === 1 ? 150 : 0;   // 蓄力→前冲动画总长,接触点在 55%
    const contact = Math.round(windup * .55);
    if (ft <= 1) dollAnim(ev.side, "atk" + dir, windup);
    later(() => {   // 接触时刻:音效/掉血/数字/冲击环/后错/屏震绑在同一瞬间
      AudioFX.play("hit", g);
      setHp(other(ev.side), ev.target, ev.targetHp);
      dollFx(other(ev.side), ev.target, (ev.crit ? "💥" : "") + "-" + ev.dmg,
             ev.crit ? "#fbbf24" : "#f87171", "d" + g);
      if (ft <= 1) {
        impactAt(other(ev.side), ev.target, g >= 2);
        dollAnim(other(ev.side), "jolt" + dir, 200);
        shake(ft === 0 ? (g >= 3 ? 3 : g) : (g >= 2 ? 1 : 0));
      }
    }, contact);
    const stop = ft === 0 ? [0, 25, 55, 75][g] : ft === 1 ? [0, 0, 30, 40][g] : 0;   // 顿帧
    return contact + stop;
  }
  if (t === "block") {
    const g = dmgTier(ev);
    if (ft <= 1) {
      dollAnim(ev.side, "bounce" + dir, ft === 0 ? 260 : 170);   // 攻击方被弹回
      partAnim(other(ev.side), ev.blocker, "squashK", 220);      // 格挡手瞬间压缩
    }
    AudioFX.play("block", g);
    setHp(other(ev.side), ev.blocker, ev.blockerHp);
    dollFx(other(ev.side), ev.blocker, "🛡-" + ev.taken, "#8bd5ff", g >= 2 ? "d1" : "");
    return ft === 0 && g >= 2 ? 30 : 0;
  }
  if (t === "dodge") {   // 侧滑闪身:不闪白、不屏震——和命中读感完全区分
    if (ft <= 1) {
      dollAnim(ev.side, "atk" + dir, ft === 0 ? 220 : 140);
      dollAnim(other(ev.side), "slip" + dir, ft === 0 ? 260 : 160);
    }
    AudioFX.play("dodge", 0);
    dollFx(other(ev.side), view[other(ev.side)]._torso, "💨", "#8bd5ff", "", false);
    return 0;
  }
  if (t === "break") {
    AudioFX.play("break", 0);
    debrisFly(ev.side, ev.part, ft);   // 先克隆飞散(带原色),再把原件置灰
    dollKill(ev.side, ev.part);
    dollFx(ev.side, ev.part, "💀", "#f87171", "d2");
    if (ft <= 1) {
      impactAt(ev.side, ev.part, true);
      shake(ft === 0 ? 3 : 2);
      return ft === 0 ? 90 : 45;   // 击破长顿帧
    }
    return 0;
  }
  if (t === "stunned") {
    AudioFX.play("stun", 0);
    if (ft <= 1) dollAnim(ev.side, "wobbleK", 420);
    dollFx(ev.side, view[ev.side]._torso, "💫眩晕", "#fbbf24", "d1", false);
    return 0;
  }
  if (t === "stun_set") {
    dollFx(ev.side, view[ev.side]._torso, "⚡头被毁!", "#fbbf24", "d1", false);
    return 0;
  }
  if (t === "no_command") {
    dollFx(ev.side, ev.part, "🚫", "#9b93b8", "", false);
    return 0;
  }
  // —— 机制事件(Q17)——
  if (t === "grab") {
    if (ft <= 1) {
      dollAnim(ev.side, "atk" + dir, ft === 0 ? 240 : 150);
      dollAnim(other(ev.side), "squashK", 260);
    }
    AudioFX.play("stun", 0);
    dollFx(other(ev.side), view[other(ev.side)]._torso, "🫳被抓住!", "#fbbf24", "d1", false);
    return 0;
  }
  if (t === "absorb") {
    AudioFX.play("block", 0);
    if (ft <= 1) partAnim(other(ev.side), ev.target, "squashK", 200);
    dollFx(other(ev.side), ev.target, "🪖" + ev.left, "#8bd5ff", "", false);
    return 0;
  }
  if (t === "status") {
    dollFx(ev.side, ev.part, ev.status === "burn" ? "🔥" : "🩸",
           ev.status === "burn" ? "#fb923c" : "#f87171", "", false);
    return 0;
  }
  if (t === "dot_tick") {
    setHp(ev.side, ev.part, ev.partHp);
    dollFx(ev.side, ev.part, (ev.status === "burn" ? "🔥" : "🩸") + "-" + ev.dmg,
           ev.status === "burn" ? "#fb923c" : "#f87171", "", false);
    return 0;
  }
  if (t === "part_stun_set" || t === "part_stunned") {
    if (t === "part_stunned" && ft <= 1) partAnim(ev.side, ev.part, "wobbleK", 320);
    dollFx(ev.side, ev.part, "🦴", "#fbbf24", "", false);
    return 0;
  }
  if (t === "spore_set") {
    dollFx(ev.side, ev.part, "🌱", "#4ade80", "", false);
    return 0;
  }
  if (t === "spore_grow") {
    sporeGrow(ev.side, ev.part, ev.hp);
    AudioFX.play("win", 0);
    dollFx(ev.side, ev.part, "🌱重生!", "#4ade80", "d1", false);
    return 0;
  }
  if (t === "regen" || t === "regen_start" || t === "adrenaline") {
    if (ev.parts) for (const h of ev.parts) setHp(ev.side, h.part, h.hp);
    dollFx(ev.side, view[ev.side]._torso, t === "adrenaline" ? "💉+5" : "💚+" + (ev.heal || 2),
           "#4ade80", "", false);
    return 0;
  }
  if (t === "gland") {
    AudioFX.play("break", 0);
    setHp(other(ev.side), ev.target, ev.targetHp);
    dollFx(other(ev.side), ev.target, "💥-" + ev.dmg, "#fbbf24", "d2");
    if (ft <= 1) { impactAt(other(ev.side), ev.target, true); shake(ft === 0 ? 2 : 1); }
    return ft === 0 ? 55 : 0;
  }
  return 0;
}
// 芽孢重生:battle 里部件原地变身「芽孢长出来的手」,把面板/纸偶的旧键改绑到新名字
function sporeGrow(sideKey, newLabel, hp) {
  const oldLabel = newLabel.replace("芽孢长出来的手", "长有芽孢的手");
  const v = view[sideKey][oldLabel];
  if (!v) return;
  delete view[sideKey][oldLabel];
  v.maxHp = hp;
  view[sideKey][newLabel] = v;
  const el = document.getElementById(v.id);
  if (el) {
    el.classList.remove("dead");
    el.querySelector(".pname").textContent = newLabel;
    el.querySelector(".bar .fill").style.width = "100%";
    el.querySelector(".bar .ghost").style.width = "100%";
    el.querySelector(".hp").textContent = `${hp}/${hp}`;
  }
  const d = dollEl(sideKey, oldLabel);
  if (d) {
    d.setAttribute("data-dk", `${sideKey}|${newLabel}`);
    d.classList.remove("dead", "hitfx");
    d.style.background = partColor({ name: "芽孢长出来的手", kind: "hand" });
  }
}
function applyInstant(ev) {   // 瞬间挡:只应用状态,零特效
  if (ev.type === "hit") setHp(other(ev.side), ev.target, ev.targetHp);
  else if (ev.type === "block") setHp(other(ev.side), ev.blocker, ev.blockerHp);
  else if (ev.type === "break") dollKill(ev.side, ev.part);
  else if (ev.type === "dot_tick") setHp(ev.side, ev.part, ev.partHp);
  else if (ev.type === "gland") setHp(other(ev.side), ev.target, ev.targetHp);
  else if (ev.type === "spore_grow") sporeGrow(ev.side, ev.part, ev.hp);
  else if (ev.parts) for (const h of ev.parts) setHp(ev.side, h.part, h.hp);
}

// ===== 战役教学提示(Akun 2026-07-15 教学点设计:按战斗事件触发)=====
// L2「上手」教眩晕+格挡;L3「先攻与闪避」教先攻+闪避
const TUTORIALS = {
  2: [
    { id: "stun", when: (ev) => ev.type === "break" && ev.side === "B" && ev.kind === "head",
      text: "如果生物的头被击破,它会眩晕 1 回合" },
    { id: "block", when: (ev) => ev.type === "block" && ev.side === "B",
      text: "你的手不仅可以用来攻击,还可以用来格挡——格挡成功后伤害会由手承担,同时受到的伤害会减少" },
  ],
  3: [
    { id: "init", when: (ev, m) => ev.type === "round_start" && ev.round === 2 && ev.initA > 0,
      text: "你的腿和尾巴提供了额外的先攻,所以你总是容易先出手" },
    { id: "dodge", when: (ev) => ev.type === "dodge" && ev.side === "B",
      text: "太棒了,你灵活的腿帮助你躲开了剑齿虎的攻击" },
  ],
};
let tutFired = new Set();
function checkTutorial(ev) {
  if (!curCamp || !TUTORIALS[curCamp.lv]) return;
  for (const t of TUTORIALS[curCamp.lv]) {
    if (tutFired.has(t.id) || !t.when(ev)) continue;
    tutFired.add(t.id);
    logLine("📖 " + t.text, "tut");
  }
}

let curSeed = null, curCamp = null;
function startBattle(seed, campLevel) {
  clearTimeout(playTimer);
  clearFx();
  AudioFX.ensure();   // 在用户点击手势内解锁 AudioContext(移动端 autoplay 政策)
  tutFired = new Set();
  curSeed = seed == null ? Math.floor(Math.random() * 1e9) : seed;
  curCamp = campLevel || null;
  const specA = Object.assign({ name: "我的怪兽" }, build);
  const specB = campLevel
    ? Object.assign({ name: `第${campLevel.lv}关·${campLevel.name}` }, campLevel.enemy)
    : Object.assign({ name: enemySel.value }, E.ARCHETYPES[enemySel.value]);
  const a = E.makeMonster(specA.name, specA), b = E.makeMonster(specB.name, specB);
  renderArena(a, b);
  $("logbox").innerHTML = "";
  $("banner").className = "banner";
  $("seedLbl").textContent = "seed " + curSeed;
  const rep = E.battle(specA, specB, curSeed);
  const evs = rep.events;
  let i = 0;
  const step = () => {
    if (i >= evs.length) return finishSeq(rep);
    if (speedMs === 0) {   // 瞬间挡:清掉在途特效,直接铺完
      clearFx();
      for (; i < evs.length; i++) { const l = evLine(evs[i]); if (l) logLine(l[0], l[1]); checkTutorial(evs[i]); applyInstant(evs[i]); }
      return finishSeq(rep);
    }
    const ev = evs[i++];
    const l = evLine(ev);
    if (l) logLine(l[0], l[1]);
    checkTutorial(ev);
    const extra = playEv(ev, fxTier());              // 前摇/顿帧占用的额外时长
    const beat = Math.round(speedMs * (BEAT[ev.type] != null ? BEAT[ev.type] : .5));
    playTimer = setTimeout(step, (l ? beat : Math.min(beat, 60)) + extra);
  };
  step();
}
function finishSeq(rep) {   // 终结时刻:败方坍倒、胜方定格,再出结果——消掉"面板突然弹出"的程序感
  if (rep.winner !== "draw") AudioFX.play(rep.winner === "A" ? "win" : "lose", 0);
  const ft = speedMs === 0 ? 3 : fxTier();
  if (ft <= 1 && rep.winner !== "draw") {
    const d = $("doll" + (rep.winner === "A" ? "B" : "A") + "In");
    if (d) d.classList.add("defeat");
    playTimer = setTimeout(() => finish(rep), ft === 0 ? 550 : 350);
  } else {
    finish(rep);
  }
}
function finish(rep) {
  const bn = $("banner");
  if (rep.winner === "A") { bn.textContent = "🎉 我的怪兽 获胜!"; bn.className = "banner win"; }
  else if (rep.winner === "B") { bn.textContent = `💀 被 ${rep.winnerName} 击败(共 ${rep.rounds} 回合)`; bn.className = "banner lose"; }
  else { bn.textContent = "🤝 平局"; bn.className = "banner draw"; }
  logLine(rep.winner === "A" ? "🎉 胜利!" : rep.winner === "B" ? "💀 战败…" : "🤝 平局", "win");
  // 战役结算
  if (curCamp && rep.winner === "A") {
    if (!clearedSet().has(curCamp.lv)) {
      save.cleared.push(curCamp.lv);
      persist();
      toast(`🎁 首次通关!+${curCamp.reward} 生物质,解锁:${curCamp.unlocks.join("、")}`);
      logLine(`🎁 获得 ${curCamp.reward} 生物质;解锁零件:${curCamp.unlocks.join("、")}——去「装配」页升级!`, "win");
      if (curCamp.lv === 3) logLine("💡 新解锁的「头顶尖刺」「胶质瘤」是插件——在「装配」页点部件上的 🔌 挂载。", "");
    } else {
      logLine("(已通关过,本次无奖励)", "");
    }
    renderBuild();
  } else if (curCamp && rep.winner !== "A") {
    logLine("💡 打不过?去「装配」页换零件——注意能量和指挥点。", "");
  }
}
$("startBtn").onclick = () => startBattle();
$("rematch").onclick = () => startBattle(null, curCamp);
$("muteBtn").textContent = AudioFX.muted ? "🔇" : "🔊";
$("muteBtn").onclick = () => { $("muteBtn").textContent = AudioFX.toggle() ? "🔇" : "🔊"; };

renderBuild();
</script>
</body>
</html>
