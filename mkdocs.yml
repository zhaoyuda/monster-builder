site_name: monster-builder · 设计文档
site_description: 手搓一个大怪兽 —— 协作设计文档
docs_dir: design

theme:
  name: material
  language: zh
  features:
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-night
        name: 切换到夜间模式
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/weather-sunny
        name: 切换到日间模式

markdown_extensions:
  - tables
  - admonition
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

extra_javascript:
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search

nav:
  - 总览: index.md
  - 系统A · 装配: 01-assembly.md
  - 系统B · 战斗: 02-combat.md
  - 系统C · PVE: 03-pve.md
  - 系统D · PVP: 04-pvp.md
  - 待确认问题: 05-open-questions.md
  - 已拍板存档: 06-decisions.md
  - 🧪 战斗模拟:
      - 说明与报告列表: sim-reports/index.md
      - 2026-07-03 冒烟测试: sim-reports/2026-07-03-冒烟测试.md
      - 2026-07-04 指挥度 A/B: sim-reports/2026-07-04-指挥度AB.md
      - 2026-07-07 暴击与 PVE: sim-reports/2026-07-07-暴击与PVE.md
      - 2026-07-12 耗材手流诊断: sim-reports/2026-07-12-耗材手流诊断.md
      - 2026-07-12 随机配装 meta: sim-reports/2026-07-12-随机配装meta.md
      - 2026-07-15 新零件表验证: sim-reports/2026-07-15-新零件表验证.md
      - 2026-07-15 机制引擎上线: sim-reports/2026-07-15-机制引擎.md
  - 🎮 试玩 Demo: https://zhaoyuda.github.io/monster-builder/play/index.html
  - 📝 改文档指南: 给Akun的改文档指南.md
