name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 发布所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 连推多个 commit 时,新部署直接取消旧的(取消不算失败、不发失败邮件;
# 每次部署的都是当次 commit 构建的完整站点,旧的没必要跑完)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build site
        run: mkdocs build --strict

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
