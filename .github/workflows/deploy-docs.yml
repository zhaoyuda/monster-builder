name: Deploy docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 发布所需权限
permissions:
  contents: read
  pages: write
  id-token: write

# 连推多个 commit 时,新部署直接取消旧的(取消不算失败、不发失败邮件;
# 每次部署的都是当次 commit 构建的完整站点,旧的没必要跑完)
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install MkDocs Material
        run: pip install mkdocs-material

      - name: Build site
        run: mkdocs build --strict

      - name: Stamp build sha   # 防"半新半旧"部署:线上可核对本次构建的 commit
        run: echo "${GITHUB_SHA}" > site/build.txt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # 部署后线上自检:关键页面必须可达且内容非空,失败即整个 run 标红(会发失败邮件)
      - name: Verify live pages
        run: |
          sleep 10
          base="${{ steps.deployment.outputs.page_url }}"
          for path in "" "play/index.html" "play/engine.js" "05-open-questions/"; do
            url="${base}${path}"
            code=$(curl -s -o /tmp/page -w "%{http_code}" "$url")
            size=$(wc -c < /tmp/page)
            echo "$url -> $code (${size}B)"
            if [ "$code" != "200" ] || [ "$size" -lt 500 ]; then
              echo "::error::线上页面自检失败:$url 返回 $code / ${size}B"
              exit 1
            fi
          done
          # demo 页要包含引擎脚本引用,防止发布了半截页面
          curl -s "${base}play/index.html" | grep -q 'id="tabCamp"' \
            || { echo "::error::play 页内容缺失(tabCamp 不在)"; exit 1; }
          # 构建号核对:线上 build.txt 必须等于本次 commit(防 CDN 半新半旧 / 部署没生效)
          live_sha=$(curl -s "${base}build.txt" | tr -d '[:space:]')
          echo "live build: $live_sha / expect: ${GITHUB_SHA}"
          [ "$live_sha" = "${GITHUB_SHA}" ] \
            || { echo "::error::线上构建号不匹配:$live_sha != ${GITHUB_SHA}"; exit 1; }
